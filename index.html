<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo API 教學工具</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="page-container">
    <div class="title">Todo API 教學工具</div>
    <div class="layout">
      <!-- 左側待辦清單 -->
      <div class="card left-card">
        <div class="header-row">
          <h2>待辦事項</h2>
          <div>
            <button id="export-btn" style="margin-right: 12px; padding: 4px 12px; cursor: pointer; border: 1px solid #e5e7eb; border-radius: 4px; background: white; font-size: 14px; transition: all 0.2s;"><i class="fa-solid fa-download"></i> 匯出 store.json</button>
            <span class="logout-text">登出</span>
          </div>
        </div>
        <div class="input-container">
          <input type="text" class="input-box" id="todo-input" placeholder="新增待辦事項...">
          <input type="date" class="input-box" id="todo-date" style="width: 140px; margin-left: 8px;">
          <button class="add-btn" id="add-btn">新增</button>
        </div>
        <div class="tabs">
          <div class="tab active" id="tab-all" data-tab="all" style="cursor:pointer;">全部 (<span id="count-all">0</span>)</div>
          <div class="tab" id="tab-pending" data-tab="pending" style="cursor:pointer;">待完成 (<span id="count-pending">0</span>)</div>
          <div class="tab" id="tab-done" data-tab="done" style="cursor:pointer;">已完成 (<span id="count-done">0</span>)</div>
        </div>
        <div id="todo-list">
          <div class="empty-text">還沒有待辦事項，新增一筆吧！</div>
        </div>
      </div>
      <!-- 右側 API 監控 -->
      <div class="card right-card">
        <div class="right-header">
          <h2>API 運作監控</h2>
          <div class="slow-mode-area">
            慢速模式
            <div class="toggle-bg" id="slow-mode-toggle-btn">
              <div class="toggle-thumb" id="slow-mode-thumb"></div>
            </div>
          </div>
        </div>
        <div class="endpoint-box">
          <span class="label">API ENDPOINT</span>
          <div>
            <span class="method" id="current-method">GET</span><span class="path-text" id="current-path">/todos/</span>
          </div>
          <div class="url-text">https://todolist-api.hexschool.io</div>
          <div class="status-row">
            <div class="dot"></div>
            <span>完成</span>
          </div>
        </div>
        <div class="network-graph">
          <div class="network-node">
            <div class="icon-box">
              <i class="fa-regular fa-window-maximize"></i>
            </div>
            <span class="node-text">瀏覽器</span>
          </div>
          <div class="line" id="connection-line"></div>
          <div class="network-node">
            <div class="icon-box">
              <i class="fa-solid fa-server"></i>
            </div>
            <span class="node-text">伺服器</span>
          </div>
        </div>
        <div>
          <span class="label">回應</span>
          <div class="response-box" id="json-response">
<span style="color:#d1d5db">{</span>
  <span style="color:#10b981">"status"</span><span style="color:#d1d5db">:</span> <span style="color:#60a5fa">true</span><span style="color:#d1d5db">,</span>
  <span style="color:#10b981">"data"</span><span style="color:#d1d5db">: []</span>
<span style="color:#d1d5db">}</span>
          </div>
        </div>
        <div>
          <span class="label">請求紀錄</span>
          <div id="history-container">
            <div class="history-item">
              <span class="hist-method get">GET</span>
              <span class="hist-path">/todos/</span>
              <span class="hist-code">200</span>
              <span class="hist-time">1186ms</span>
            </div>
            <div class="history-item">
              <span class="hist-method post">POST</span>
              <span class="hist-path">/users/sign_in</span>
              <span class="hist-code">200</span>
              <span class="hist-time">1284ms</span>
            </div>
            <div class="history-item">
              <span class="hist-method post">POST</span>
              <span class="hist-path">/users/sign_up</span>
              <span class="hist-code">201</span>
              <span class="hist-time">1737ms</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
